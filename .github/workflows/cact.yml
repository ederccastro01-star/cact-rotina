name: CACT - Rotina de Publicacoes

on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch: {}

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4
      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Executar a rotina
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_REFRESH_TOKEN: ${{ secrets.GRAPH_REFRESH_TOKEN }}
          ONEDRIVE_BASE: ${{ secrets.ONEDRIVE_BASE }}
        run: python runner_nuvem.py
